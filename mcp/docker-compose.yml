# Docker Compose file to manage all MCP servers
# This allows you to start/stop all servers with a single command:
#   docker compose -f mcp/docker-compose.yml up -d
#   docker compose -f mcp/docker-compose.yml down

services:
  # Damodaran Valuation MCP Server
  damodaran-mcp:
    build:
      context: ./damodaran_valuation
      network: host
    container_name: damodaran-mcp
    restart: unless-stopped
    env_file:
      - ./damodaran_valuation/.env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - POSTGRES_HOST=supabase-db
      - POSTGRES_PORT=5432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8100:8000"
    networks:
      - investment-net
      - supabase_default
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Fundamentus B3 MCP Server
  fundamentus-mcp:
    build:
      context: ./fundamentus_b3
      network: host
    container_name: fundamentus-mcp
    restart: unless-stopped
