services:
  damodaran-mcp:
    build:
      context: .
    container_name: damodaran-mcp
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8100:8000"
    networks:
      - investment-net

networks:
  investment-net:
    external: true

